app-id: com.leobelisario.ProjetoComSoc
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: projeto-comsoc

# Libera o acesso à internet durante a compilação (necessário para o pip baixar o PySide6)
build-options:
  build-args:
    - --share=network

finish-args:
  # --- Interface Gráfica ---
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri            # Aceleração de hardware (GPU)
  
  # --- Sistema de Arquivos ---
  # Permite salvar os materiais gerados na pasta Documentos do usuário
  - --filesystem=xdg-documents/ProjetoComSoc_Saida:create
  
  # --- Impressão ---
  # Dá acesso ao servidor de impressão (CUPS) para o QPrinter funcionar
  - --socket=cups

modules:
  - name: dependencias
    buildsystem: simple
    build-commands:
      # Instala o PySide6 puro diretamente na raiz do container (/app)
      - pip3 install --prefix=/app PySide6
    
  - name: projeto-comsoc
    buildsystem: simple
    build-commands:
      # Prepara os diretórios internos
      - mkdir -p /app/share/projeto-comsoc
      - mkdir -p /app/bin
      
      # Copia todo o código-fonte Python para a pasta do sistema
      - cp -r * /app/share/projeto-comsoc/
      
      # Cria o script de inicialização (wrapper) que invoca o Python nativo
      - |
        cat << 'EOF' > /app/bin/projeto-comsoc
        #!/bin/sh
        export PYTHONPATH="/app/share/projeto-comsoc:$PYTHONPATH"
        exec python3 /app/share/projeto-comsoc/main.py "$@"
        EOF
        
      # Dá permissão de execução ao script
      - chmod +x /app/bin/projeto-comsoc
    sources:
      - type: dir
        path: .