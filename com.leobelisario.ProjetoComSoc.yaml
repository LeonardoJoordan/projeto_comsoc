app-id: com.leobelisario.ProjetoComSoc
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: projeto-comsoc

build-options:
  build-args:
    - --share=network

finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-documents/ProjetoComSoc_Saida:create
  - --socket=cups

modules:
  - name: dependencias
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app PySide6
    
  - name: projeto-comsoc
    buildsystem: simple
    build-commands:
      # Prepara os diretórios padrão do Linux
      - mkdir -p /app/share/projeto-comsoc
      - mkdir -p /app/bin
      - mkdir -p /app/share/applications
      - mkdir -p /app/share/icons/hicolor/512x512/apps
      
      # VASSOURA: Apaga os ambientes virtuais e pastas de compilação antes de copiar
      - rm -rf venv .venv .git build build-dir repo *.flatpak .flatpak-builder
      - cp -r * /app/share/projeto-comsoc/
      - cp icone.png /app/share/icons/hicolor/512x512/apps/com.leobelisario.ProjetoComSoc.png
      
      # Cria o executável
      - |
        cat << 'EOF' > /app/bin/projeto-comsoc
        #!/bin/sh
        export PYTHONPATH="/app/share/projeto-comsoc:$PYTHONPATH"
        exec python3 /app/share/projeto-comsoc/main.py "$@"
        EOF
      - chmod +x /app/bin/projeto-comsoc
      
      # CRIA O ATALHO DO MENU INICIAR
      - |
        cat << 'EOF' > /app/share/applications/com.leobelisario.ProjetoComSoc.desktop
        [Desktop Entry]
        Name=Projeto COMSOC
        Comment=Construtor Otimizado de Material Social
        Exec=projeto-comsoc
        Icon=com.leobelisario.ProjetoComSoc
        Terminal=false
        Type=Application
        Categories=Office;Utility;Graphics;
        EOF
        
    sources:
      - type: dir
        path: .